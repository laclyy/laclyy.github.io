name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il progetto
        uses: actions/checkout@v4
      - name: Prepara Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Installa dipendenze
        run: npm ci
      - name: Crea il sito
        run: npm run build
      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5
      - name: Carica il sito compilato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Pubblica
        id: deployment
        uses: actions/deploy-pages@v4
